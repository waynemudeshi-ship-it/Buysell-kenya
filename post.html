<!DOCTYPE html>
<html>
<head>
  <title>Post Item - Buy Sell Kenya</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Post Your Item</h2>

<form onsubmit="addItem(event)">
  <input type="text" id="name" placeholder="Item name" required>
  <input type="number" id="price" placeholder="Price (KSh)" required>
  <input type="text" id="phone" placeholder="Your WhatsApp number" required>
  <input type="text" id="image" placeholder="Image URL (optional)">
  <button type="submit">Post (Pay KSh 20 later - M-Pesa)</button>
</form>

<script src="app.js"></script>
</body>
